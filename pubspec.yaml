name: listku_app
description: "Aplikasi To-Do List."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # 1. State Management
  provider: ^6.1.2
  
  # 2. Integrasi API
  http: ^1.2.1
  
  # 3. Local Storage
  shared_preferences: ^2.2.3
  
  # 4. Mobile Feature (Notification)
  flutter_local_notifications: ^17.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true